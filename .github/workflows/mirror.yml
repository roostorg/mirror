name: Mirror
on: 
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:
jobs:
  mirror:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - awesome-safety-tools
          - coop
          - coop-integration-example
          - osprey
          - playground
    steps:
      - uses: actions/checkout@v6
        with:
          repository: roostorg/${{ matrix.repo }}
          fetch-depth: 0
      - name: GitLab
        run: |
          git remote remove gitlab 2>/dev/null || true
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/roostorg/${{ matrix.repo }}.git
          git push --force --prune gitlab +refs/heads/*:refs/heads/* +refs/tags/*:refs/tags/*
      - name: Tangled
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TANGLED_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 tangled.org >> ~/.ssh/known_hosts 2>/dev/null
          git remote remove tangled 2>/dev/null || true
          git remote add tangled git@tangled.org:roost.tools/${{ matrix.repo }}
          git push --force --prune tangled +refs/heads/*:refs/heads/* +refs/tags/*:refs/tags/*
